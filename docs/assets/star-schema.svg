<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif" role="img" aria-label="Star schema: 6 dimensions and 3 fact tables, plus a disconnected Key Measures table.">
  <rect width="980" height="620" rx="18" fill="#0B1220"/>
  <!-- title -->
  <text x="40" y="50" fill="#E7EEF8" font-size="26" font-weight="700">Branch &amp; Channel Performance — star schema</text>
  <text x="40" y="76" fill="#9DB0CC" font-size="14">Import (TMDL) · 6 dimensions · 3 facts · 22 measures · 11 relationships</text>

  <!-- relationship lines (drawn first, behind boxes) -->
  <g stroke="#2A3B57" stroke-width="2">
    <line x1="220" y1="172" x2="430" y2="262"/>   <!-- Date -> facts -->
    <line x1="495" y1="190" x2="495" y2="236"/>   <!-- Branch -> facts -->
    <line x1="835" y1="172" x2="565" y2="262"/>   <!-- Channel -> Transactions -->
    <line x1="845" y1="470" x2="565" y2="400"/>   <!-- Transaction Type -> facts -->
    <line x1="495" y1="486" x2="495" y2="420"/>   <!-- Product -> facts -->
    <line x1="160" y1="470" x2="430" y2="400"/>   <!-- Customer -> facts -->
  </g>

  <!-- DIMENSIONS (blue) -->
  <g>
    <!-- Date -->
    <rect x="70" y="120" width="150" height="56" rx="10" fill="#16233B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="145" y="146" text-anchor="middle" fill="#E7EEF8" font-size="15" font-weight="600">Date</text>
    <text x="145" y="164" text-anchor="middle" fill="#8FA3C2" font-size="11">marked date table</text>
    <!-- Branch -->
    <rect x="410" y="110" width="170" height="56" rx="10" fill="#16233B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="495" y="136" text-anchor="middle" fill="#E7EEF8" font-size="15" font-weight="600">Branch</text>
    <text x="495" y="154" text-anchor="middle" fill="#8FA3C2" font-size="11">region › city › branch</text>
    <!-- Channel -->
    <rect x="760" y="120" width="150" height="56" rx="10" fill="#16233B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="835" y="146" text-anchor="middle" fill="#E7EEF8" font-size="15" font-weight="600">Channel</text>
    <text x="835" y="164" text-anchor="middle" fill="#8FA3C2" font-size="11">digital / assisted</text>
    <!-- Customer -->
    <rect x="70" y="444" width="180" height="56" rx="10" fill="#16233B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="160" y="470" text-anchor="middle" fill="#E7EEF8" font-size="15" font-weight="600">Customer</text>
    <text x="160" y="488" text-anchor="middle" fill="#8FA3C2" font-size="11">segment, KYC, demo.</text>
    <!-- Product -->
    <rect x="410" y="486" width="170" height="56" rx="10" fill="#16233B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="495" y="512" text-anchor="middle" fill="#E7EEF8" font-size="15" font-weight="600">Product</text>
    <text x="495" y="530" text-anchor="middle" fill="#8FA3C2" font-size="11">category / sub-cat.</text>
    <!-- Transaction Type -->
    <rect x="760" y="444" width="180" height="56" rx="10" fill="#16233B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="850" y="470" text-anchor="middle" fill="#E7EEF8" font-size="15" font-weight="600">Transaction Type</text>
    <text x="850" y="488" text-anchor="middle" fill="#8FA3C2" font-size="11">cash / transfer / …</text>
  </g>

  <!-- FACTS (green, center) -->
  <g>
    <rect x="410" y="236" width="170" height="56" rx="10" fill="#14271F" stroke="#2DD4A7" stroke-width="2"/>
    <text x="495" y="261" text-anchor="middle" fill="#E7EEF8" font-size="15" font-weight="700">Transactions</text>
    <text x="495" y="279" text-anchor="middle" fill="#86C6AE" font-size="11">fact · per transaction</text>

    <rect x="410" y="300" width="170" height="52" rx="10" fill="#14271F" stroke="#2DD4A7" stroke-width="2"/>
    <text x="495" y="323" text-anchor="middle" fill="#E7EEF8" font-size="15" font-weight="700">NPS Surveys</text>
    <text x="495" y="340" text-anchor="middle" fill="#86C6AE" font-size="11">fact · per survey</text>

    <rect x="410" y="360" width="170" height="56" rx="10" fill="#14271F" stroke="#2DD4A7" stroke-width="2"/>
    <text x="495" y="385" text-anchor="middle" fill="#E7EEF8" font-size="15" font-weight="700">Branch Targets</text>
    <text x="495" y="403" text-anchor="middle" fill="#86C6AE" font-size="11">fact · branch × month</text>
  </g>

  <!-- KEY MEASURES (violet, disconnected) -->
  <rect x="762" y="286" width="176" height="74" rx="10" fill="#1E1A33" stroke="#9B8CFF" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="850" y="314" text-anchor="middle" fill="#E7EEF8" font-size="15" font-weight="600">Key Measures</text>
  <text x="850" y="333" text-anchor="middle" fill="#B7AEE8" font-size="11">disconnected table</text>
  <text x="850" y="349" text-anchor="middle" fill="#B7AEE8" font-size="11">22 explicit measures</text>

  <!-- legend -->
  <g font-size="12.5" fill="#9DB0CC">
    <rect x="40" y="566" width="14" height="14" rx="3" fill="#16233B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="62" y="577">Dimension</text>
    <rect x="150" y="566" width="14" height="14" rx="3" fill="#14271F" stroke="#2DD4A7" stroke-width="2"/>
    <text x="172" y="577">Fact</text>
    <rect x="226" y="566" width="14" height="14" rx="3" fill="#1E1A33" stroke="#9B8CFF" stroke-width="1.6" stroke-dasharray="4 3"/>
    <text x="248" y="577">Disconnected (measures host)</text>
    <text x="470" y="577" fill="#6B7C99">Dimensions filter facts · single-direction · all numbers come from measures</text>
  </g>
</svg>
